<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Birthday Special ❤️</title>

    <!-- UPGRADED FONTS: Cinzel for premium title + Poppins -->
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            height: 100%;
            width: 100%;
            overflow: hidden;
            font-family: 'Poppins', sans-serif;
        }

        .video-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: -2;
        }

        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.65);
            z-index: -1;
        }

        .content {
            position: relative;
            height: 100%;
            width: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 20px;
            padding-bottom: 12vh;
            z-index: 1;
        }

        /* TITLE CONTAINER - CINEMATIC SIZE */
        .title-container {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 8px;
            margin-bottom: 25px;
            margin-top: 2vh;
        }

        /* 🔥 LINE 1: HAPPY BIRTHDAY */
        .letter-main {
            font-family: 'Poppins', sans-serif;
            font-size: 3.5rem;
            font-weight: 600;
            letter-spacing: 6px;
            background-image: linear-gradient(135deg, #FFF886 10%, #F072B6 100%);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            opacity: 0;
            transform: translateY(-80px);
            animation: dropLetter 1.1s cubic-bezier(0.22, 1, 0.36, 1) forwards;
        }

        /* 💖 LINE 2: KYLIE */
        .letter-name {
            font-family: 'Playfair Display', serif;
            font-size: 5.2rem;
            letter-spacing: 2px;
            background-image: linear-gradient(135deg, #FFE985 10%, #FA742B 100%);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            opacity: 0;
            transform: translateY(-80px);
            animation: dropLetter 1.2s ease forwards;
        }

        @keyframes dropLetter {
            0% {
                opacity: 0;
                transform: translateY(-80px) rotate(-5deg);
            }

            60% {
                opacity: 1;
                transform: translateY(8px) rotate(2deg);
            }

            100% {
                opacity: 1;
                transform: translateY(0) rotate(0);
            }
        }

        /* flying heart during title animation */
        .title-heart {
            position: fixed;
            pointer-events: none;
            z-index: 2000;
            font-size: 20px;
            animation: titleHeartFloat 1.2s ease-out forwards;
        }

        @keyframes titleHeartFloat {
            0% {
                transform: translate(0, 0) scale(0.6);
                opacity: 1;
            }

            100% {
                transform: translate(var(--tx, 40px), var(--ty, -100px)) scale(1.3);
                opacity: 0;
            }
        }

        /* ===== INITIAL HIDDEN STATES FOR SEQUENCE ===== */
        .subtitle-wrapper {
            opacity: 0;
            transform: scale(0.9);
            margin: 10px 0 5px 0;
            display: block;
            transition: all 0.6s cubic-bezier(0.34, 1.2, 0.64, 1);
        }

            .subtitle-wrapper.show {
                opacity: 1;
                transform: scale(1);
            }

        .subtitle {
            letter-spacing: 8px;
            font-size: 14px;
            font-weight: 500;
            background-image: linear-gradient(135deg, #F0FF00 10%, #58CFFB 100%);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            text-transform: uppercase;
            font-family: 'Poppins', sans-serif;
        }

        /* Tagline - hidden initially */
        .tagline {
            margin-top: 20px;
            margin-bottom: 8px;
            font-size: 17px;
            font-weight: 400;
            background-image: linear-gradient(135deg, #69FF97 10%, #00E4FF 100%);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: 1.5px;
            opacity: 0;
            transition: opacity 1s ease;
        }

            .tagline.show {
                opacity: 1;
            }

        /* BUTTON - FULLY TRANSPARENT with KYLIE gradient */
        .btn {
            margin-top: 25px;
            padding: 13px 48px;
            border-radius: 50px;
            position: relative;
            background: transparent !important;
            border: 2px solid transparent;
            background-image: linear-gradient(transparent, transparent), linear-gradient(135deg, #FFE985 10%, #FA742B 100%);
            background-origin: border-box;
            background-clip: padding-box, border-box;
            font-size: 17px;
            font-weight: 600;
            cursor: pointer;
            letter-spacing: 1px;
            opacity: 0;
            transform: translateY(120px);
            transition: all 0.4s ease;
        }

            /* Text gradient - SAME AS KYLIE TITLE */
            .btn span {
                background: linear-gradient(135deg, #FFE985 10%, #FA742B 100%);
                -webkit-background-clip: text;
                background-clip: text;
                -webkit-text-fill-color: transparent;
                font-weight: 600;
            }

            /* Show state */
            .btn.show {
                opacity: 1;
                transform: translateY(0);
            }

            /* Hover effect - slightly brighter version */
            .btn:hover {
                transform: scale(1.08);
                background-image: linear-gradient(transparent, transparent), linear-gradient(135deg, #FFF2A0 10%, #FF8850 100%);
                box-shadow: 0 0 18px rgba(250, 116, 43, 0.4);
            }

                .btn:hover span {
                    background: linear-gradient(135deg, #FFF2A0 10%, #FF8850 100%);
                    -webkit-background-clip: text;
                    background-clip: text;
                    -webkit-text-fill-color: transparent;
                }
        /* SLIDESHOW CONTAINER - hidden initially */
        .message-slideshow {
            margin-top: 40px;
            margin-bottom: 20px;
            min-height: 90px;
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100%;
            position: relative;
            opacity: 0;
            transition: opacity 1.2s ease;
        }

            .message-slideshow.show {
                opacity: 1;
            }

        /* Romantic message - clean text with gradient */
        .romantic-message {
            font-family: 'Poppins', sans-serif;
            font-size: 0.75rem;
            font-weight: 400;
            text-align: center;
            max-width: 80%;
            background-image: linear-gradient(315deg, #58CFFB 10%, #F0FF00 100%);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: 1px;
            line-height: 1.5;
            text-shadow: 0 0 6px rgba(0,0,0,0.25);
            white-space: nowrap;
            overflow: hidden;
        }

        /* ✨ blinking cursor */
        .typing-cursor::after {
            content: "|";
            margin-left: 4px;
            animation: blink 1s infinite;
        }

        @keyframes blink {
            0%, 50%, 100% {
                opacity: 1;
            }

            25%, 75% {
                opacity: 0;
            }
        }

        @keyframes fadeInReplace {
            0% {
                opacity: 0;
                transform: translateY(10px);
            }

            100% {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .romantic-message.exit {
            animation: fadeOutReplace 0.4s ease forwards;
        }

        @keyframes fadeOutReplace {
            0% {
                opacity: 1;
                transform: translateY(0);
            }

            100% {
                opacity: 0;
                transform: translateY(-10px);
            }
        }

        /* 🎵 ROTATING MUSIC CD */
        .music-toggle {
            position: fixed;
            top: 24px;
            right: 24px;
            width: 55px;
            height: 55px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            background: radial-gradient(circle at 30% 30%, #2a2a2a, #0a0a0a);
            box-shadow: 0 0 0 3px rgba(255,215,0,0.4), 0 0 0 6px rgba(0,0,0,0.3);
            cursor: pointer;
            z-index: 999;
            transition: 0.2s;
        }

            .music-toggle.rotating {
                animation: cdRotate 4s linear infinite;
            }

        @keyframes cdRotate {
            from {
                transform: rotate(0deg);
            }

            to {
                transform: rotate(360deg);
            }
        }

        .music-toggle i {
            font-size: 28px;
            color: #FFD966;
            text-shadow: 0 0 5px rgba(255,200,0,0.8);
        }

        .music-toggle:hover {
            transform: scale(1.08);
            box-shadow: 0 0 0 3px rgba(255,215,0,0.8), 0 0 0 8px rgba(0,0,0,0.4);
        }

        /* floating hearts */
        .heart {
            position: fixed;
            bottom: -20px;
            color: #ff4d6d;
            font-size: 24px;
            pointer-events: none;
            z-index: 1000;
            animation: floatUpLove 4s ease-out forwards;
            filter: drop-shadow(0 0 6px rgba(255,80,120,0.8));
        }

        @keyframes floatUpLove {
            0% {
                transform: translateY(0) scale(0.8);
                opacity: 1;
            }

            100% {
                transform: translateY(-110vh) scale(1.5);
                opacity: 0;
            }
        }

        /* 💘 CUSTOM CURSOR */
        body {
            cursor: none;
        }

        .custom-cursor {
            position: fixed;
            top: 0;
            left: 0;
            font-size: 22px;
            pointer-events: none;
            z-index: 9999;
            transform: translate(-50%, -50%);
            transition: transform 0.08s ease-out;
        }

            .custom-cursor::after {
                content: "";
                position: absolute;
                width: 30px;
                height: 30px;
                background: radial-gradient(circle, rgba(255,105,180,0.4), transparent);
                border-radius: 50%;
                top: 50%;
                left: 50%;
                transform: translate(-50%, -50%);
            }

        /* 🎈 BALLOONS */
        .balloon {
            position: fixed;
            bottom: -50px;
            font-size: 22px;
            pointer-events: none;
            z-index: 999;
            animation: floatBalloon 6s ease-out forwards;
        }

        @keyframes floatBalloon {
            0% {
                transform: translateY(0) scale(0.8);
                opacity: 1;
            }

            100% {
                transform: translateY(-120vh) scale(1.2);
                opacity: 0;
            }
        }

        /* 💖 HEARTS (reuse but slightly refined) */
        .heart-float {
            position: fixed;
            bottom: -20px;
            font-size: 22px;
            pointer-events: none;
            z-index: 999;
            animation: floatHeart 4s ease-out forwards;
        }

        @keyframes floatHeart {
            0% {
                transform: translateY(0) scale(0.8);
                opacity: 1;
            }

            100% {
                transform: translateY(-110vh) scale(1.4);
                opacity: 0;
            }
        }

        /* Responsive */
        @media (max-width: 750px) {
            .letter-main {
                font-size: 2rem;
                letter-spacing: 3px;
            }

            .letter-name {
                font-size: 3rem;
            }

            .romantic-message {
                font-size: 0.7rem;
                white-space: normal;
                max-width: 90%;
            }

            .subtitle {
                font-size: 10px;
                letter-spacing: 5px;
            }

            .tagline {
                font-size: 14px;
                margin-top: 15px;
            }

            .btn {
                margin-top: 22px;
                padding: 10px 32px;
                font-size: 15px;
            }

            .music-toggle {
                width: 48px;
                height: 48px;
                top: 18px;
                right: 18px;
            }

                .music-toggle i {
                    font-size: 24px;
                }

            .content {
                padding-bottom: 10vh;
            }

            .message-slideshow {
                margin-top: 30px;
            }
        }

        @media (max-width: 550px) {
            .letter-main {
                font-size: 1.5rem;
                letter-spacing: 2px;
            }

            .letter-name {
                font-size: 2.2rem;
            }

            .romantic-message {
                font-size: 0.65rem;
            }

            .subtitle {
                font-size: 8px;
                letter-spacing: 4px;
            }

            .tagline {
                font-size: 12px;
            }

            .btn {
                padding: 8px 26px;
                font-size: 13px;
            }
        }

        @media (min-width: 1400px) {
            .letter-main {
                font-size: 4.5rem;
            }

            .letter-name {
                font-size: 6.5rem;
            }

            .romantic-message {
                font-size: 0.9rem;
            }

            .subtitle {
                font-size: 16px;
                letter-spacing: 10px;
            }
        }
    </style>
</head>
<body>
    <div id="cursor" class="custom-cursor">💘</div>

    <video class="video-bg" autoplay muted loop playsinline>
        <source src="assets/1.mp4" type="video/mp4">
    </video>
    <div class="overlay"></div>

    <!-- MUSIC CD BUTTON -->
    <div id="musicIcon" class="music-toggle">
        <i class="fa-solid fa-compact-disc"></i>
    </div>

    <div class="content">
        <!-- Animated title -->
        <div id="titleContainer" class="title-container"></div>

        <!-- Subtitle "FROM • YOUR • BELOVED • ALEX" -->
        <div id="subtitleWrapper" class="subtitle-wrapper">
            <div class="subtitle">FROM • YOUR • BELOVED • ALEX</div>
        </div>

        <!-- Slideshow for romantic messages -->
        <div id="slideshowContainer" class="message-slideshow"></div>

        <div class="tagline">
            Let's make your day memorable ✨
        </div>

        <button class="btn" onclick="startMagic()">
            <span>Let's Begin❤️</span>
        </button>
    </div>

    <audio id="bgMusic" loop preload="auto">
        <source src="assets/1.mp3" type="audio/mpeg">
    </audio>

    <script>
        // ---------- TITLE WITH DROP ANIMATION & FLYING HEARTS ----------
        const titleLine1 = "HAPPY BIRTHDAY";
        const titleLine2 = "KYLIE";
        const container = document.getElementById("titleContainer");

        // 🎈 BALLOON EFFECT
        function launchBalloons(count = 15) {
            const balloons = ["🎈", "🎉", "✨"];
            for (let i = 0; i < count; i++) {
                let el = document.createElement("div");
                el.className = "balloon";
                el.innerHTML = balloons[Math.floor(Math.random() * balloons.length)];
                el.style.left = Math.random() * 100 + "vw";
                el.style.fontSize = (18 + Math.random() * 20) + "px";
                document.body.appendChild(el);
                setTimeout(() => el.remove(), 6000);
            }
        }

        // 💖 HEART EFFECT
        function launchHearts(count = 20) {
            const hearts = ["💖", "❤️", "💕", "💗"];
            for (let i = 0; i < count; i++) {
                let el = document.createElement("div");
                el.className = "heart-float";
                el.innerHTML = hearts[Math.floor(Math.random() * hearts.length)];
                el.style.left = Math.random() * 100 + "vw";
                el.style.fontSize = (18 + Math.random() * 25) + "px";
                document.body.appendChild(el);
                setTimeout(() => el.remove(), 4000);
            }
        }

        function createTitleWithDrop() {
            container.innerHTML = "";
            let delay = 0;

            // LINE 1: HAPPY BIRTHDAY
            titleLine1.split('').forEach(char => {
                const span = document.createElement('span');
                span.className = 'letter-main';
                if (char === ' ') {
                    span.innerHTML = '&nbsp;';
                    span.style.width = '18px';
                } else {
                    span.textContent = char;
                }
                span.style.animationDelay = `${delay}s`;
                container.appendChild(span);

                setTimeout(() => {
                    launchBalloons(2);
                }, delay * 1000);

                delay += 0.12;
            });

            // LINE BREAK
            const br = document.createElement("div");
            br.style.width = "100%";
            br.style.height = "10px";
            container.appendChild(br);
            delay += 0.4;

            // LINE 2: KYLIE
            titleLine2.split('').forEach(char => {
                const span = document.createElement('span');
                span.className = 'letter-name';
                span.textContent = char;
                span.style.animationDelay = `${delay}s`;
                container.appendChild(span);

                setTimeout(() => {
                    launchHearts(2);
                }, delay * 1000);

                delay += 0.18;
            });

            const totalDuration = delay * 1000 + 800;

            // SEQUENCE: Subtitle → Tagline → Button → Slideshow
            setTimeout(() => {
                const subtitleWrap = document.getElementById("subtitleWrapper");
                const tagline = document.querySelector(".tagline");
                const button = document.querySelector(".btn");
                const slideshow = document.getElementById("slideshowContainer");

                if (subtitleWrap) subtitleWrap.classList.add("show");

                setTimeout(() => {
                    if (tagline) tagline.classList.add("show");
                }, 900);

                setTimeout(() => {
                    if (button) button.classList.add("show");
                }, 1800);

                setTimeout(() => {
                    if (slideshow) slideshow.classList.add("show");
                    startMessageSlideshow();
                }, 2600);

            }, totalDuration);
        }

        // ---------- ROMANTIC MESSAGES SLIDESHOW (TYPING EFFECT) ----------
        const messages = [
            "To the girl who makes my world brighter—Happy Birthday ❤️",
            "Happy Birthday, my love—you make every day feel special.",
            "With you, every moment is beautiful. Happy Birthday, my everything ❤️"
        ];
        let msgIndex = 0;
        let slideshowInterval = null;
        let currentMessageDiv = null;

        function startMessageSlideshow() {
            const slideshowDiv = document.getElementById("slideshowContainer");
            if (!slideshowDiv) return;
            slideshowDiv.innerHTML = "";
            showReplacingMessage(slideshowDiv);
            if (slideshowInterval) clearInterval(slideshowInterval);
            slideshowInterval = setInterval(() => {
                showReplacingMessage(slideshowDiv);
            }, 6000);
        }

        function showReplacingMessage(containerEl) {
            if (currentMessageDiv) {
                currentMessageDiv.classList.add('exit');
                setTimeout(() => {
                    if (currentMessageDiv && currentMessageDiv.parentNode) {
                        currentMessageDiv.remove();
                    }
                    createAndAppendNewMessage(containerEl);
                }, 350);
            } else {
                createAndAppendNewMessage(containerEl);
            }
        }

        function createAndAppendNewMessage(containerEl) {
            const text = messages[msgIndex % messages.length];
            const newMsg = document.createElement('div');
            newMsg.className = 'romantic-message typing-cursor';
            newMsg.textContent = "";
            containerEl.appendChild(newMsg);
            currentMessageDiv = newMsg;
            let i = 0;

            function typeChar() {
                if (i < text.length) {
                    newMsg.textContent += text.charAt(i);
                    i++;
                    setTimeout(typeChar, 70);
                } else {
                    newMsg.classList.remove("typing-cursor");
                }
            }
            typeChar();
            msgIndex++;
        }

        // ---------- MUSIC CD (ROTATION + ICON TOGGLE) ----------
        const music = document.getElementById("bgMusic");
        const musicBtn = document.getElementById("musicIcon");
        const iconEl = musicBtn.querySelector("i");

        music.volume = 0.6;
        music.loop = true;
        music.muted = true;

        let started = false;

        function updateCD() {
            if (!music.muted && !music.paused) {
                musicBtn.classList.add("rotating");
                iconEl.classList.remove("fa-compact-disc");
                iconEl.classList.add("fa-music");
            } else {
                musicBtn.classList.remove("rotating");
                iconEl.classList.remove("fa-music");
                iconEl.classList.add("fa-compact-disc");
            }
        }

        function unlockAudio() {
            if (!started) {
                music.muted = false;
                music.play().then(() => {
                    started = true;
                    updateCD();
                }).catch(() => { });
                window.removeEventListener("click", unlockAudio);
                window.removeEventListener("touchstart", unlockAudio);
            }
        }

        window.addEventListener("click", unlockAudio);
        window.addEventListener("touchstart", unlockAudio);

        musicBtn.addEventListener("click", (e) => {
            e.stopPropagation();
            if (!started) {
                unlockAudio();
                return;
            }
            if (music.muted) {
                music.muted = false;
                music.play();
            } else {
                music.muted = true;
            }
            updateCD();
        });

        music.addEventListener("play", updateCD);
        music.addEventListener("pause", updateCD);
        music.addEventListener("ended", () => {
            if (!music.muted && started) {
                music.currentTime = 0;
                music.play().catch(e => console.log("loop replay", e));
                updateCD();
            }
        });

        // ---------- INITIAL PAGE LOAD ----------
        const subtitleWrap = document.getElementById("subtitleWrapper");
        subtitleWrap.classList.remove('show');
        createTitleWithDrop();

        const slideshowDivInit = document.getElementById("slideshowContainer");
        if (slideshowDivInit) slideshowDivInit.innerHTML = "";

        // ---------- MAGIC BUTTON: HEART EXPLOSION & REDIRECT ----------
        window.startMagic = function () {
            const heartColors = ["#FF5E7E", "#FF85A1", "#FFB3C6", "#FF3B5C", "#FFD966", "#FF99CC", "#FF6B8B"];
            const heartIcons = ["💖", "❤️", "💗", "💓", "💕", "💞", "💘", "🌸", "✨", "💝"];
            for (let i = 0; i < 55; i++) {
                let heart = document.createElement("div");
                heart.className = "heart";
                const randomHeart = heartIcons[Math.floor(Math.random() * heartIcons.length)];
                heart.innerHTML = randomHeart;
                heart.style.left = Math.random() * 100 + "vw";
                const size = 18 + Math.random() * 32;
                heart.style.fontSize = size + "px";
                const duration = 3 + Math.random() * 2.8;
                heart.style.animationDuration = duration + "s";
                const randColor = heartColors[Math.floor(Math.random() * heartColors.length)];
                heart.style.color = randColor;
                heart.style.filter = `drop-shadow(0 0 4px ${randColor})`;
                document.body.appendChild(heart);
                setTimeout(() => heart.remove(), duration * 1000);
            }
            const btn = document.querySelector('.btn');
            if (btn) {
                btn.style.transform = "scale(0.96)";
                setTimeout(() => { if (btn) btn.style.transform = ""; }, 150);
            }
            setTimeout(() => {
                window.location.href = "page2.html";
            }, 1600);
        };

        window.addEventListener('error', (e) => {
            if (e.target.tagName === 'VIDEO' || e.target.tagName === 'AUDIO') e.preventDefault();
        });

        const contentDiv = document.querySelector('.content');
        function adjustBottomPadding() {
            if (window.innerHeight <= 700) {
                contentDiv.style.paddingBottom = '8vh';
            } else {
                contentDiv.style.paddingBottom = '12vh';
            }
        }
        adjustBottomPadding();
        window.addEventListener('resize', adjustBottomPadding);

        // 💘 CURSOR FOLLOW
        const cursor = document.getElementById("cursor");
        document.addEventListener("mousemove", (e) => {
            cursor.style.left = e.clientX + "px";
            cursor.style.top = e.clientY + "px";
        });

        // 💖 HOVER EFFECT ON BUTTONS
        document.querySelectorAll("button").forEach(btn => {
            btn.addEventListener("mouseenter", () => {
                cursor.innerHTML = "❤️";
                cursor.style.transform = "translate(-50%, -50%) scale(1.4)";
            });
            btn.addEventListener("mouseleave", () => {
                cursor.innerHTML = "💘";
                cursor.style.transform = "translate(-50%, -50%) scale(1)";
            });
        });

        // 🎯 HOVER EFFECTS ON TITLE LETTERS
        container.addEventListener("mouseover", (e) => {
            if (e.target.classList.contains("letter-main")) {
                launchBalloons(6);
            }
            if (e.target.classList.contains("letter-name")) {
                launchHearts(8);
            }
        });
    </script>
